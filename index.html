<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Quản lý Pin (BMS)</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 400px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #0056b3; }
        .result-box { margin-top: 20px; padding: 15px; border-radius: 5px; display: none; text-align: center; }
        .safe { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .warning { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .danger { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align: center; color: #333;">Kiểm tra SOH Pin</h2>
    
    <label>Số chu kỳ hiện tại:</label>
    <input type="number" id="cycle" value="50">
    
    <label>Nhiệt độ môi trường (°C):</label>
    <input type="number" id="temp" value="25.0" step="0.1">
    
    <label>Độ dốc nhiệt độ (°C):</label>
    <input type="number" id="gradient" value="0.5" step="0.1">
    
    <button onclick="predictSOH()">Chẩn đoán AI</button>

    <div id="resultBox" class="result-box">
        <h1 id="sohValue" style="margin: 0; font-size: 36px;">--%</h1>
        <strong id="statusText">Đang chờ...</strong>
    </div>
</div>

<script>
    async function predictSOH() {
        const payload = {
            cycle: document.getElementById('cycle').value,
            temp: document.getElementById('temp').value,
            gradient: document.getElementById('gradient').value
        };

        // Gửi dữ liệu lên API của máy chủ Flask
        const response = await fetch('https://api-du-doan-pin-xxxx.onrender.com/predict', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        
        const data = await response.json();
        
        if(data.success) {
            const box = document.getElementById('resultBox');
            box.style.display = 'block';
            document.getElementById('sohValue').innerText = data.soh_value + "%";
            document.getElementById('statusText').innerText = "Trạng thái: " + data.status;

            // Đổi màu giao diện theo cảnh báo
            box.className = "result-box"; 
            if(data.status === "AN TOÀN") box.classList.add("safe");
            else if(data.status === "CẢNH BÁO") box.classList.add("warning");
            else box.classList.add("danger");
        } else {
            alert("Lỗi máy chủ: " + data.error);
        }
    }
</script>

</body>
</html>
