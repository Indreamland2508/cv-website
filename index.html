<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMS AI Dashboard | Quản lý Sức khỏe Pin</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --safe: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .dashboard-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 480px;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h2 {
            margin: 0;
            font-size: 24px;
            color: var(--text-main);
        }

        .header p {
            margin: 5px 0 0;
            font-size: 14px;
            color: var(--text-muted);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            box-sizing: border-box;
            background-color: #f8fafc;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        .btn-submit:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }

        /* Khu vực kết quả */
        .result-container {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px dashed #cbd5e1;
            display: none; /* Ẩn khi chưa có kết quả */
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .soh-value {
            font-size: 48px;
            font-weight: 800;
            margin: 10px 0;
            line-height: 1;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Thanh tiến trình (Progress Bar) */
        .progress-bg {
            width: 100%;
            height: 12px;
            background-color: #e2e8f0;
            border-radius: 10px;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            border-radius: 10px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.5s ease;
        }

        /* Bảng màu Trạng thái */
        .theme-safe .soh-value { color: var(--safe); }
        .theme-safe .status-badge { background-color: #d1fae5; color: var(--safe); }
        .theme-safe .progress-fill { background-color: var(--safe); }

        .theme-warning .soh-value { color: var(--warning); }
        .theme-warning .status-badge { background-color: #fef3c7; color: var(--warning); }
        .theme-warning .progress-fill { background-color: var(--warning); }

        .theme-danger .soh-value { color: var(--danger); }
        .theme-danger .status-badge { background-color: #fee2e2; color: var(--danger); }
        .theme-danger .progress-fill { background-color: var(--danger); }
    </style>
</head>
<body>

    <div class="dashboard-card">
        <div class="header">
            <h2>Hệ thống Quản lý Pin (BMS)</h2>
            <p>Dự báo SOH bằng AI (Random Forest)</p>
        </div>

        <div class="input-group">
            <label for="cycle">Số chu kỳ vận hành (Cycle):</label>
            <input type="number" id="cycle" value="120" min="1" placeholder="Nhập số chu kỳ...">
        </div>

        <div class="input-group">
            <label for="temp">Nhiệt độ môi trường (°C):</label>
            <input type="number" id="temp" value="35.0" step="0.1" placeholder="Nhập nhiệt độ...">
        </div>

        <div class="input-group">
            <label for="gradient">Độ dốc nhiệt độ (°C/chu kỳ):</label>
            <input type="number" id="gradient" value="1.5" step="0.1" placeholder="Nhập độ dốc nhiệt...">
        </div>

        <button id="submitBtn" class="btn-submit" onclick="predictSOH()">🚀 Chẩn đoán AI ngay</button>

        <div id="resultBox" class="result-container">
            <div id="statusBadge" class="status-badge">Đang xử lý</div>
            <div id="sohValue" class="soh-value">--%</div>
            
            <div class="progress-bg">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <p style="font-size: 13px; color: var(--text-muted); margin-top: 15px;">Mức SOH hiện tại của pin so với dung lượng thiết kế ban đầu.</p>
        </div>
    </div>

    <script>
        // QUAN TRỌNG: Hãy chèn lại đường link Render của bạn vào biến này
        const API_URL = 'https://rul-soh-predictions.onrender.com/predict';

        async function predictSOH() {
            const btn = document.getElementById('submitBtn');
            const resultBox = document.getElementById('resultBox');
            
            // Lấy dữ liệu
            const payload = {
                cycle: document.getElementById('cycle').value,
                temp: document.getElementById('temp').value,
                gradient: document.getElementById('gradient').value
            };

            // Đổi trạng thái nút bấm thành Loading
            btn.disabled = true;
            btn.innerText = "⏳ Đang tính toán...";

            try {
                // Gọi API
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                
                if(data.success) {
                    // Hiển thị khung kết quả
                    resultBox.style.display = 'block';
                    
                    // Cập nhật số liệu
                    const soh = data.soh_value;
                    document.getElementById('sohValue').innerText = soh + "%";
                    document.getElementById('statusBadge').innerText = data.status;
                    
                    // Cập nhật thanh chạy
                    document.getElementById('progressFill').style.width = soh + "%";

                    // Đổi màu sắc giao diện theo trạng thái
                    resultBox.className = "result-container"; // Reset class
                    if (data.status === "AN TOÀN") {
                        resultBox.classList.add("theme-safe");
                    } else if (data.status === "CẢNH BÁO") {
                        resultBox.classList.add("theme-warning");
                    } else {
                        resultBox.classList.add("theme-danger");
                    }
                } else {
                    alert("Lỗi máy chủ AI: " + data.error);
                }
            } catch (error) {
                alert("Không thể kết nối đến Máy chủ AI. Vui lòng kiểm tra lại đường link Render!");
            } finally {
                // Khôi phục nút bấm
                btn.disabled = false;
                btn.innerText = "🚀 Chẩn đoán AI ngay";
            }
        }
    </script>
</body>
</html>
